<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Minimalis — Masuk / Daftar</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center overflow-x-hidden bg-black">

    <!-- Latar Belakang Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="vid/cloudy-sky-moewalls-com.mp4" type="video/mp4">
    </video>

    <!-- Kartu Utama — full width di mobile, max-w di desktop -->
    <div class="bg-[#1c1c1c] text-white
                w-full sm:max-w-3xl
                rounded-none sm:rounded-[24px]
                min-h-screen sm:min-h-0
                p-6 sm:p-12
                shadow-2xl flex flex-col justify-center relative
                border-0 sm:border border-white/5
                overflow-hidden
                sm:mx-4">

        <!-- Tombol Kembali -->
        <a href="index.html"
           class="absolute top-4 left-4 sm:top-5 sm:left-7
                  text-white/50 hover:text-white
                  text-xs sm:text-sm font-sans font-semibold
                  transition flex items-center gap-1">
            <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
            </svg>
            Kembali
        </a>

        <div class="flex flex-col relative z-10 mt-8 sm:mt-0">

            <!-- Tab Masuk / Daftar -->
            <div class="flex gap-5 sm:gap-8 mb-6 sm:mb-8">
                <button id="tab-masuk"
                        class="text-3xl sm:text-4xl font-serif tracking-wide font-medium pb-1
                               text-white focus:outline-none transition border-b-2 border-white">
                    Masuk
                </button>
                <button id="tab-daftar"
                        class="text-3xl sm:text-4xl font-serif tracking-wide font-medium pb-1
                               text-white/40 hover:text-white/80 focus:outline-none transition border-b-2 border-transparent">
                    Daftar
                </button>
            </div>

            <!-- Formulir -->
            <div class="flex flex-col gap-3 sm:gap-4 w-full max-w-xs mb-3 sm:mb-6">
                <input id="login-username" type="text" placeholder="Email"
                    class="w-full bg-[#d1d1d1] text-gray-800 placeholder-gray-500
                           py-2 sm:py-2.5 px-5 sm:px-6 rounded-full
                           focus:outline-none focus:ring-2 focus:ring-black/30
                           text-xs sm:text-sm font-semibold shadow-inner transition">
                <input id="login-password" type="password" placeholder="Kata Sandi"
                    class="w-full bg-[#d1d1d1] text-gray-800 placeholder-gray-500
                           py-2 sm:py-2.5 px-5 sm:px-6 rounded-full
                           focus:outline-none focus:ring-2 focus:ring-black/30
                           text-xs sm:text-sm font-semibold shadow-inner transition">
                <input id="login-confirm-password" type="password" placeholder="Konfirmasi Kata Sandi"
                    class="hidden w-full bg-[#d1d1d1] text-gray-800 placeholder-gray-500
                           py-2 sm:py-2.5 px-5 sm:px-6 rounded-full
                           focus:outline-none focus:ring-2 focus:ring-black/30
                           text-xs sm:text-sm font-semibold shadow-inner transition">
            </div>

            <!-- Pesan error / sukses -->
            <p id="auth-pesan" class="hidden text-xs sm:text-sm font-sans mb-3 sm:mb-4 px-1"></p>

            <!-- Tombol Aksi -->
            <div class="flex justify-start mt-2 sm:mt-4">
                <button id="mulai-btn"
                        class="bg-black hover:bg-gray-900 active:scale-95 text-white
                               px-7 sm:px-8 py-2 rounded-xl
                               text-[10px] sm:text-xs font-bold tracking-wider shadow-lg transition-all duration-200">
                    Mulai
                </button>
            </div>
        </div>

        <!-- Ilustrasi pojok — hanya desktop -->
        <div class="hidden sm:flex absolute bottom-0 right-0 w-[240px] md:w-[280px] h-[320px] md:h-[360px] pointer-events-none select-none items-end justify-end">
            <img src="img/auth.png"
                 alt="Ilustrasi Masuk"
                 class="w-full h-full object-cover object-top rounded-tl-[120px] border-l-4 border-t-4 border-[#1c1c1c] shadow-2xl">
        </div>
    </div>

    <script src="js/koneksi.js"></script>
    <script>
        const tabMasuk             = document.getElementById('tab-masuk');
        const tabDaftar            = document.getElementById('tab-daftar');
        const loginUsername        = document.getElementById('login-username');
        const loginPassword        = document.getElementById('login-password');
        const loginConfirmPassword = document.getElementById('login-confirm-password');
        const mulaiBtn             = document.getElementById('mulai-btn');
        const authPesan            = document.getElementById('auth-pesan');

        let currentTab = 'masuk';

        function tampilkanPesan(teks, berhasil = false) {
            authPesan.innerText = teks;
            authPesan.className = `text-xs sm:text-sm font-sans mb-3 px-1 ${berhasil ? 'text-green-400' : 'text-red-400'}`;
            authPesan.classList.remove('hidden');
        }

        function setTabAktif(tab) {
            const aktif    = "text-3xl sm:text-4xl font-serif tracking-wide font-medium pb-1 text-white focus:outline-none transition border-b-2 border-white";
            const nonAktif = "text-3xl sm:text-4xl font-serif tracking-wide font-medium pb-1 text-white/40 hover:text-white/80 focus:outline-none transition border-b-2 border-transparent";
            tabMasuk.className  = tab === 'masuk'  ? aktif : nonAktif;
            tabDaftar.className = tab === 'daftar' ? aktif : nonAktif;
        }

        tabMasuk.addEventListener('click', () => {
            currentTab = 'masuk';
            setTabAktif('masuk');
            loginUsername.placeholder = "Email";
            loginConfirmPassword.classList.add('hidden');
            mulaiBtn.innerText = "Mulai";
            authPesan.classList.add('hidden');
        });

        tabDaftar.addEventListener('click', () => {
            currentTab = 'daftar';
            setTabAktif('daftar');
            loginUsername.placeholder = "Email";
            loginConfirmPassword.classList.remove('hidden');
            mulaiBtn.innerText = "Daftar Sekarang";
            authPesan.classList.add('hidden');
        });

        mulaiBtn.addEventListener('click', async () => {
            const email    = loginUsername.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
                tampilkanPesan("Mohon isi semua data!");
                return;
            }

            if (currentTab === 'daftar') {
                const confirmPassword = loginConfirmPassword.value;
                if (password !== confirmPassword) {
                    tampilkanPesan("Kedua kata sandi tidak cocok!");
                    return;
                }
                if (isSupabaseActive) {
                    try {
                        const { error } = await supabaseClient.auth.signUp({ email, password });
                        if (error) throw error;
                        tampilkanPesan("Pendaftaran berhasil! Cek email verifikasi Anda.", true);
                        setTabAktif('masuk');
                        currentTab = 'masuk';
                        mulaiBtn.innerText = "Mulai";
                        loginConfirmPassword.classList.add('hidden');
                    } catch (err) { tampilkanPesan(err.message); }
                } else {
                    tampilkanPesan("Pendaftaran lokal berhasil! Silakan masuk.", true);
                    tabMasuk.click();
                }
                return;
            }

            if (isSupabaseActive) {
                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    sessionStorage.setItem('blogUser', data.user.email);
                    sessionStorage.setItem('blogUid',  data.user.id);
                    window.location.href = 'index.html';
                } catch (err) { tampilkanPesan(err.message); }
            } else {
                sessionStorage.setItem('blogUser', email);
                window.location.href = 'index.html';
            }
        });
    </script>
</body>
</html>
