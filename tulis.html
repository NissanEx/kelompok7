<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Minimalis — Tulis Artikel</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css11`">
</head>
<body class="min-h-screen text-white flex flex-col overflow-x-hidden bg-black">

    <!-- Latar Belakang Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="vid/cloudy-sky-moewalls-com.mp4" type="video/mp4">
    </video>

    <!-- Wrapper — full height mobile, centered desktop -->
    <div class="flex-grow flex items-start sm:items-center justify-center w-full
                px-0 sm:px-4 py-0 sm:py-10">

        <!-- Kartu Tulis -->
        <div class="bg-[#1c1c1c] text-white
                    w-full sm:max-w-4xl
                    rounded-none sm:rounded-[24px]
                    min-h-screen sm:min-h-0
                    p-5 sm:p-10
                    shadow-2xl flex flex-col relative
                    border-0 sm:border border-white/5">

            <!-- Tombol Kembali -->
            <a href="index.html"
               class="absolute top-4 left-4 sm:top-5 sm:left-7
                      text-white/50 hover:text-white
                      text-xs sm:text-sm font-sans font-semibold
                      transition flex items-center gap-1 z-10">
                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
                </svg>
                Kembali
            </a>

            <!-- Judul Halaman -->
            <h2 class="text-2xl sm:text-4xl font-serif tracking-wide font-medium mt-8 sm:mt-0 mb-5 sm:mb-8">
                Tulis Artikel Baru
            </h2>

            <!-- Layout: stack di mobile, grid di desktop -->
            <div class="flex flex-col sm:grid sm:grid-cols-12 gap-4 sm:gap-8 flex-grow">

                <!-- == KOLOM KIRI: Judul + Gambar == -->
                <div class="sm:col-span-5 flex flex-col gap-4 sm:gap-6">

                    <!-- Input Judul -->
                    <div>
                        <label class="text-[9px] sm:text-[10px] text-white/40 uppercase tracking-widest font-sans font-bold block mb-1.5">
                            Judul Artikel
                        </label>
                        <input id="input-judul" type="text" placeholder="Tulis judul yang memikat..."
                            class="w-full bg-white text-gray-800 placeholder-gray-400
                                   py-2 sm:py-2.5 px-4 sm:px-6 rounded-full
                                   focus:outline-none focus:ring-2 focus:ring-red-950/40 
                                   text-xs sm:text-sm font-semibold shadow-inner transition">
                    </div>

                    <!-- Upload Gambar Sampul -->
                    <div>
                        <label class="text-[9px] sm:text-[10px] text-white/40 uppercase tracking-widest font-sans font-bold block mb-1.5">
                            Gambar Sampul
                        </label>
                        <div id="pilih-gambar-trigger"
                             class="w-full h-32 sm:h-44 bg-[#e5e5e5] hover:bg-[#dbdbdb]
                                    rounded-[14px] sm:rounded-[20px]
                                    flex flex-col items-center justify-center
                                    cursor-pointer transition-all overflow-hidden relative shadow-md group">
                            <div id="placeholder-container"
                                 class="flex flex-col items-center text-center px-4 group-hover:scale-105 transition">
                                <svg class="w-8 h-8 sm:w-10 sm:h-10 text-gray-500 mb-1.5"
                                     fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round"
                                          d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
                                </svg>
                                <span class="text-gray-600 text-[9px] sm:text-[10px] tracking-widest uppercase font-sans font-bold">
                                    Klik untuk Unggah
                                </span>
                                <span class="text-gray-500 text-[9px] mt-0.5 font-sans">JPG / PNG</span>
                            </div>
                            <img id="preview-gambar" class="hidden absolute inset-0 w-full h-full object-cover">
                        </div>
                        <input type="file" id="file-input" accept="image/*" class="hidden">
                        <button id="hapus-gambar-btn"
                                class="hidden mt-1.5 text-[10px] sm:text-xs text-white/40 hover:text-red-400 font-sans transition">
                            × Hapus gambar
                        </button>
                    </div>
                </div>

                <!-- == KOLOM KANAN: Konten + Upload == -->
                <div class="sm:col-span-7 flex flex-col gap-3 sm:gap-4">
                    <label class="text-[9px] sm:text-[10px] text-white/40 uppercase tracking-widest font-sans font-bold block mb-1">
                        Isi Konten Cerita
                    </label>
                    <textarea id="input-konten"
                              placeholder="Tuliskan cerita Anda di sini..."
                              class="w-full bg-white text-gray-800 placeholder-gray-400
                                     rounded-[12px] sm:rounded-[15px]
                                     p-4 sm:p-6
                                     focus:outline-none focus:ring-2 focus:ring-red-950/40
                                     resize-none text-xs sm:text-sm leading-relaxed
                                     no-scrollbar shadow-inner
                                     min-h-[180px] sm:min-h-[320px]
                                     flex-grow"></textarea>

                    <!-- Pesan Status -->
                    <p id="tulis-pesan" class="hidden text-xs sm:text-sm font-sans px-1"></p>

                    <!-- Footer: karakter count + tombol upload -->
                    <div class="flex justify-between items-center">
                        <span id="char-count" class="text-[9px] sm:text-[10px] text-white/30 font-sans">
                            0 karakter
                        </span>
                        <button id="upload-btn"
                                class="bg-[#2d0707] hover:bg-[#450d0d] active:scale-95 text-white
                                       px-6 sm:px-10 py-2 sm:py-2.5 rounded-full
                                       text-[10px] sm:text-xs font-bold tracking-wider shadow-lg
                                       transition-all duration-200">
                            Upload Cerita
                        </button>
                    </div>
                </div>
            </div><!-- end grid -->
        </div><!-- end kartu -->
    </div><!-- end wrapper -->

    <script src="js/koneksi.js"></script>
    <script>
        const pilihGambarTrigger   = document.getElementById('pilih-gambar-trigger');
        const fileInput            = document.getElementById('file-input');
        const previewGambar        = document.getElementById('preview-gambar');
        const placeholderContainer = document.getElementById('placeholder-container');
        const hapusGambarBtn       = document.getElementById('hapus-gambar-btn');
        const inputJudul           = document.getElementById('input-judul');
        const inputKonten          = document.getElementById('input-konten');
        const uploadBtn            = document.getElementById('upload-btn');
        const charCount            = document.getElementById('char-count');
        const tulisPesan           = document.getElementById('tulis-pesan');

        const currentUser    = sessionStorage.getItem('blogUser') || null;
        const currentUserUid = sessionStorage.getItem('blogUid')  || null;

        // Hitung karakter
        inputKonten.addEventListener('input', () => {
            charCount.innerText = `${inputKonten.value.length} karakter`;
        });

        // Pilih gambar
        pilihGambarTrigger.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                previewGambar.src = ev.target.result;
                previewGambar.classList.remove('hidden');
                placeholderContainer.classList.add('hidden');
                hapusGambarBtn.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        // Hapus gambar
        hapusGambarBtn.addEventListener('click', () => {
            previewGambar.classList.add('hidden');
            previewGambar.src = "";
            fileInput.value = "";
            placeholderContainer.classList.remove('hidden');
            hapusGambarBtn.classList.add('hidden');
        });

        function tampilkanPesan(teks, berhasil = false) {
            tulisPesan.innerText = teks;
            tulisPesan.className = `text-xs sm:text-sm font-sans px-1 ${berhasil ? 'text-green-400' : 'text-red-400'}`;
            tulisPesan.classList.remove('hidden');
            setTimeout(() => tulisPesan.classList.add('hidden'), 3000);
        }

        // Upload cerita
        uploadBtn.addEventListener('click', async () => {
            const judul  = inputJudul.value.trim();
            const konten = inputKonten.value.trim();

            if (!judul || !konten) {
                tampilkanPesan("Isi judul & konten terlebih dahulu!");
                return;
            }

            const imgSrc = (previewGambar.src && !previewGambar.classList.contains('hidden'))
                ? previewGambar.src
                : "https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400&auto=format&fit=crop";

            const authorName = currentUser
                ? (currentUser.includes('@') ? currentUser.split('@')[0] : currentUser)
                : "Anonim";

            const colors = [
                "bg-[#4a0e0e] hover:bg-[#5f1414]",
                "bg-[#0e244a] hover:bg-[#143265]",
                "bg-[#0e4a2e] hover:bg-[#14653f]"
            ];
            const selectedColor = colors[Math.floor(Math.random() * colors.length)];

            const postObj = {
                judul,
                author:    authorName,
                deskripsi: konten.substring(0, 45) + "...",
                konten,
                image:     imgSrc,
                color:     selectedColor
            };

            uploadBtn.disabled  = true;
            uploadBtn.innerText = "Mengirim...";

            if (isSupabaseActive) {
                try {
                    const { error } = await supabaseClient.from('posts').insert([postObj]).select();
                    if (error) throw error;
                    tampilkanPesan("Cerita berhasil dipos!", true);
                    setTimeout(() => window.location.href = 'home.html', 1500);
                } catch (err) {
                    tampilkanPesan("Gagal mengirim: " + err.message);
                    uploadBtn.disabled  = false;
                    uploadBtn.innerText = "Upload Cerita";
                }
            } else {
                const draft = JSON.parse(sessionStorage.getItem('draftPosts') || '[]');
                draft.unshift({ id: Date.now(), ...postObj });
                sessionStorage.setItem('draftPosts', JSON.stringify(draft));
                tampilkanPesan("Cerita disimpan secara lokal!", true);
                setTimeout(() => window.location.href = 'home.html', 1500);
            }
        });
    </script>
</body>
</html>
