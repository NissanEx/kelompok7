<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Minimalis — Tulis Artikel</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center overflow-x-hidden bg-black">

    <!-- Latar Belakang Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="vid/green-tree-moewalls-com.mp4" type="video/mp4">
    </video>

    <!-- Kartu Tulis Utama -->
    <div class="bg-[#1c1c1c] text-white w-full max-w-4xl rounded-[24px] p-8 md:p-10 shadow-2xl flex flex-col justify-between relative min-h-[550px] border border-white/5 mx-4 my-10">

        <!-- Tombol Kembali -->
        <a href="index.html" class="absolute top-5 left-7 text-white/40 hover:text-white text-sm font-sans font-semibold transition duration-150 flex items-center gap-1 z-10">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
            </svg>
            Kembali
        </a>

        <div class="grid grid-cols-1 md:grid-cols-12 gap-8 items-stretch flex-grow mt-8">

            <!-- Kolom Kiri: Judul & Gambar Sampul -->
            <div class="md:col-span-5 flex flex-col justify-between gap-6">
                <div>
                    <h2 class="text-4xl font-serif tracking-wide mb-8 font-medium">Tulis Artikel Baru</h2>
                    <div class="w-full">
                        <label class="text-[10px] text-white/40 uppercase tracking-widest font-sans font-bold block mb-2">Judul Artikel</label>
                        <input id="input-judul" type="text" placeholder="Tulis judul yang memikat..."
                            class="w-full bg-white text-gray-800 py-2.5 px-6 rounded-full focus:outline-none focus:ring-2 focus:ring-red-950/40 text-sm font-semibold shadow-inner transition duration-150">
                    </div>
                </div>

                <div class="flex flex-col items-center md:items-start justify-end flex-grow pb-2">
                    <label class="text-[10px] text-white/40 uppercase tracking-widest font-sans font-bold block mb-2 self-start">Gambar Sampul</label>
                    <div id="pilih-gambar-trigger" class="w-full h-44 bg-[#e5e5e5] hover:bg-[#dbdbdb] rounded-[20px] flex flex-col items-center justify-center cursor-pointer transition-all duration-200 overflow-hidden relative shadow-md group">
                        <div id="placeholder-container" class="flex flex-col items-center text-center px-4 transition duration-200 group-hover:scale-105">
                            <svg class="w-10 h-10 text-gray-500 mb-2" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 15.75l5.159-5.159a2.25 2.25 0 013.182 0l5.159 5.159m-1.5-1.5l1.409-1.409a2.25 2.25 0 013.182 0l2.909 2.909m-18 3.75h16.5a1.5 1.5 0 001.5-1.5V6a1.5 1.5 0 00-1.5-1.5H3.75A1.5 1.5 0 002.25 6v12a1.5 1.5 0 001.5 1.5zm10.5-11.25h.008v.008h-.008V8.25zm.375 0a.375.375 0 11-.75 0 .375.375 0 01.75 0z"/>
                            </svg>
                            <span class="text-gray-600 text-[10px] tracking-widest uppercase font-sans font-bold">Klik untuk Unggah Gambar</span>
                            <span class="text-gray-500 text-[10px] mt-1 font-sans">JPG / PNG</span>
                        </div>
                        <img id="preview-gambar" class="hidden absolute inset-0 w-full h-full object-cover">
                    </div>
                    <input type="file" id="file-input" accept="image/*" class="hidden">
                    <!-- Tombol hapus gambar (muncul setelah gambar dipilih) -->
                    <button id="hapus-gambar-btn" class="hidden mt-2 text-xs text-white/40 hover:text-red-400 font-sans transition">
                        × Hapus gambar
                    </button>
                </div>
            </div>

            <!-- Kolom Kanan: Konten & Tombol Upload -->
            <div class="md:col-span-7 flex flex-col justify-between gap-4">
                <div class="h-full flex flex-col">
                    <label class="text-[10px] text-white/40 uppercase tracking-widest font-sans font-bold block mb-2">Isi Konten Cerita</label>
                    <textarea id="input-konten"
                        placeholder="Tuliskan cerita atau konten tulisan Anda secara mengalir di sini..."
                        class="w-full flex-grow bg-white text-gray-800 rounded-[15px] p-6 focus:outline-none focus:ring-2 focus:ring-red-950/40 resize-none text-sm leading-relaxed no-scrollbar shadow-inner min-h-[320px] placeholder-gray-400"></textarea>
                </div>

                <!-- Pesan Status -->
                <p id="tulis-pesan" class="hidden text-sm font-sans px-1"></p>

                <div class="flex justify-between items-center mt-1">
                    <!-- Jumlah karakter -->
                    <span id="char-count" class="text-[10px] text-white/30 font-sans">0 karakter</span>
                    <button id="upload-btn" class="bg-[#2d0707] hover:bg-[#450d0d] active:scale-95 text-white px-10 py-2.5 rounded-full text-xs font-bold tracking-wider shadow-lg transition-all duration-200">
                        Upload Cerita
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/koneksi.js"></script>
    <script>
        // ---- Referensi Elemen ----
        const pilihGambarTrigger  = document.getElementById('pilih-gambar-trigger');
        const fileInput           = document.getElementById('file-input');
        const previewGambar       = document.getElementById('preview-gambar');
        const placeholderContainer = document.getElementById('placeholder-container');
        const hapusGambarBtn      = document.getElementById('hapus-gambar-btn');
        const inputJudul          = document.getElementById('input-judul');
        const inputKonten         = document.getElementById('input-konten');
        const uploadBtn           = document.getElementById('upload-btn');
        const charCount           = document.getElementById('char-count');
        const tulisPesan          = document.getElementById('tulis-pesan');

        // Ambil data sesi pengguna (jika sudah login dari auth.html)
        const currentUser    = sessionStorage.getItem('blogUser') || null;
        const currentUserUid = sessionStorage.getItem('blogUid')  || null;

        // ---- Penghitung Karakter ----
        inputKonten.addEventListener('input', () => {
            charCount.innerText = `${inputKonten.value.length} karakter`;
        });

        // ---- Pilih Gambar ----
        pilihGambarTrigger.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                previewGambar.src = ev.target.result;
                previewGambar.classList.remove('hidden');
                placeholderContainer.classList.add('hidden');
                hapusGambarBtn.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        // ---- Hapus Gambar ----
        hapusGambarBtn.addEventListener('click', () => {
            previewGambar.classList.add('hidden');
            previewGambar.src = "";
            fileInput.value = "";
            placeholderContainer.classList.remove('hidden');
            hapusGambarBtn.classList.add('hidden');
        });

        // ---- Tampilkan Pesan Status ----
        function tampilkanPesan(teks, berhasil = false) {
            tulisPesan.innerText = teks;
            tulisPesan.className = `text-sm font-sans px-1 ${berhasil ? 'text-green-400' : 'text-red-400'}`;
            tulisPesan.classList.remove('hidden');
            setTimeout(() => tulisPesan.classList.add('hidden'), 3000);
        }

        // ---- Upload Cerita ----
        uploadBtn.addEventListener('click', async () => {
            const judul  = inputJudul.value.trim();
            const konten = inputKonten.value.trim();

            if (!judul || !konten) {
                tampilkanPesan("Isi judul & konten terlebih dahulu!");
                return;
            }

            const imgSrc = (previewGambar.src && !previewGambar.classList.contains('hidden'))
                ? previewGambar.src
                : "https://images.unsplash.com/photo-1544005313-94ddf0286df2?q=80&w=400&auto=format&fit=crop";

            const authorName = currentUser
                ? (currentUser.includes('@') ? currentUser.split('@')[0] : currentUser)
                : "Anonim";

            const colors = [
                "bg-[#4a0e0e] hover:bg-[#5f1414]",
                "bg-[#0e244a] hover:bg-[#143265]",
                "bg-[#0e4a2e] hover:bg-[#14653f]"
            ];
            const selectedColor = colors[Math.floor(Math.random() * colors.length)];

            const postObj = {
                judul,
                author:    authorName,
                deskripsi: konten.substring(0, 45) + "...",
                konten,
                image:     imgSrc,
                color:     selectedColor
            };

            uploadBtn.disabled  = true;
            uploadBtn.innerText = "Mengirim...";

            if (isSupabaseActive) {
                try {
                    const { error } = await supabaseClient.from('posts').insert([postObj]).select();
                    if (error) throw error;
                    tampilkanPesan("Cerita berhasil dipos!", true);
                    setTimeout(() => window.location.href = 'index.html', 1500);
                } catch (err) {
                    console.error(err);
                    tampilkanPesan("Gagal mengirim ke database: " + err.message);
                    uploadBtn.disabled  = false;
                    uploadBtn.innerText = "Upload Cerita";
                }
            } else {
                // Mode offline: simpan ke sessionStorage sebagai antrian sementara
                const draft = JSON.parse(sessionStorage.getItem('draftPosts') || '[]');
                draft.unshift({ id: Date.now(), ...postObj });
                sessionStorage.setItem('draftPosts', JSON.stringify(draft));
                tampilkanPesan("Cerita disimpan secara lokal!", true);
                setTimeout(() => window.location.href = 'index.html', 1500);
            }
        });
    </script>
</body>
</html>
