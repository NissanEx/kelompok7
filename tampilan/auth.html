<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Minimalis — Masuk / Daftar</title>
    <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,700;1,400;1,700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body class="min-h-screen text-white flex flex-col items-center justify-center overflow-x-hidden bg-black">

    <!-- Latar Belakang Video -->
    <video autoplay muted loop playsinline class="bg-video">
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>

    <!-- Kartu Utama Masuk / Daftar -->
    <div class="bg-[#1c1c1c] text-white w-full max-w-3xl rounded-[24px] p-10 md:p-12 shadow-2xl flex flex-col justify-between relative min-h-[460px] border border-white/5 overflow-hidden mx-4">

        <!-- Tombol Kembali ke Home -->
        <a href="home.html" class="absolute top-5 left-7 text-white/40 hover:text-white text-sm font-sans font-semibold transition duration-150 flex items-center gap-1">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/>
            </svg>
            Kembali
        </a>

        <div class="flex flex-col justify-between h-full flex-grow relative z-10">
            <div class="max-w-md">
                <!-- Tab Masuk / Daftar -->
                <div class="flex gap-8 mb-8 pb-2">
                    <button id="tab-masuk" class="text-4xl font-serif tracking-wide font-medium pb-2 text-white focus:outline-none transition duration-150 border-b-2 border-white">
                        Masuk
                    </button>
                    <button id="tab-daftar" class="text-4xl font-serif tracking-wide font-medium pb-2 text-white/40 hover:text-white/80 focus:outline-none transition duration-150 border-b-2 border-transparent">
                        Daftar
                    </button>
                </div>

                <!-- Formulir -->
                <div class="flex flex-col gap-4 w-full max-w-xs mb-6">
                    <input id="login-username" type="text" placeholder="Email"
                        class="w-full bg-[#d1d1d1] text-gray-800 placeholder-gray-500 py-2.5 px-6 rounded-full focus:outline-none focus:ring-2 focus:ring-black/30 text-sm font-semibold shadow-inner transition duration-150">
                    <input id="login-password" type="password" placeholder="Kata Sandi"
                        class="w-full bg-[#d1d1d1] text-gray-800 placeholder-gray-500 py-2.5 px-6 rounded-full focus:outline-none focus:ring-2 focus:ring-black/30 text-sm font-semibold shadow-inner transition duration-150">
                    <input id="login-confirm-password" type="password" placeholder="Konfirmasi Kata Sandi"
                        class="hidden w-full bg-[#d1d1d1] text-gray-800 placeholder-gray-500 py-2.5 px-6 rounded-full focus:outline-none focus:ring-2 focus:ring-black/30 text-sm font-semibold shadow-inner transition duration-150">
                </div>

                <!-- Pesan error / sukses -->
                <p id="auth-pesan" class="hidden text-sm font-sans mb-4 px-1"></p>

                <!-- Tombol Aksi -->
                <div class="w-full max-w-xs flex justify-center mt-6">
                    <button id="mulai-btn" class="bg-black hover:bg-gray-900 active:scale-95 text-white px-8 py-2 rounded-xl text-xs font-bold tracking-wider shadow-lg transition-all duration-200">
                        Mulai
                    </button>
                </div>
            </div>
        </div>

        <!-- Ilustrasi pojok kanan bawah -->
        <div class="absolute bottom-0 right-0 w-[240px] md:w-[280px] h-[320px] md:h-[360px] pointer-events-none select-none flex items-end justify-end">
            <img src="https://images.unsplash.com/photo-1578632767115-351597cf2477?q=80&w=600&auto=format&fit=crop"
                alt="Ilustrasi Masuk"
                class="w-full h-full object-cover object-top rounded-tl-[120px] border-l-4 border-t-4 border-[#1c1c1c] shadow-2xl">
        </div>
    </div>

    <script src="../js/koneksi.js"></script>
    <script>
        // ---- Referensi Elemen ----
        const tabMasuk             = document.getElementById('tab-masuk');
        const tabDaftar            = document.getElementById('tab-daftar');
        const loginUsername        = document.getElementById('login-username');
        const loginPassword        = document.getElementById('login-password');
        const loginConfirmPassword = document.getElementById('login-confirm-password');
        const mulaiBtn             = document.getElementById('mulai-btn');
        const authPesan            = document.getElementById('auth-pesan');

        let currentTab = 'masuk';

        // ---- Tampilkan pesan inline ----
        function tampilkanPesan(teks, berhasil = false) {
            authPesan.innerText = teks;
            authPesan.className = `text-sm font-sans mb-4 px-1 ${berhasil ? 'text-green-400' : 'text-red-400'}`;
            authPesan.classList.remove('hidden');
        }

        // ---- Gaya Tab Aktif ----
        function setTabAktif(tab) {
            const aktif   = "text-4xl font-serif tracking-wide font-medium pb-2 text-white focus:outline-none transition duration-150 border-b-2 border-white";
            const nonAktif = "text-4xl font-serif tracking-wide font-medium pb-2 text-white/40 hover:text-white/80 focus:outline-none transition duration-150 border-b-2 border-transparent";
            tabMasuk.className  = tab === 'masuk'  ? aktif : nonAktif;
            tabDaftar.className = tab === 'daftar' ? aktif : nonAktif;
        }

        // ---- Event Tab ----
        tabMasuk.addEventListener('click', () => {
            currentTab = 'masuk';
            setTabAktif('masuk');
            loginUsername.placeholder = "Email";
            loginConfirmPassword.classList.add('hidden');
            mulaiBtn.innerText = "Mulai";
            authPesan.classList.add('hidden');
        });

        tabDaftar.addEventListener('click', () => {
            currentTab = 'daftar';
            setTabAktif('daftar');
            loginUsername.placeholder = "Email";
            loginConfirmPassword.classList.remove('hidden');
            mulaiBtn.innerText = "Daftar Sekarang";
            authPesan.classList.add('hidden');
        });

        // ---- Aksi Tombol Mulai ----
        mulaiBtn.addEventListener('click', async () => {
            const email    = loginUsername.value.trim();
            const password = loginPassword.value;

            if (!email || !password) {
                tampilkanPesan("Mohon isi semua data!");
                return;
            }

            if (currentTab === 'daftar') {
                const confirmPassword = loginConfirmPassword.value;
                if (password !== confirmPassword) {
                    tampilkanPesan("Kedua kata sandi tidak cocok!");
                    return;
                }

                if (isSupabaseActive) {
                    try {
                        const { error } = await supabaseClient.auth.signUp({ email, password });
                        if (error) throw error;
                        tampilkanPesan("Pendaftaran berhasil! Silakan cek email verifikasi Anda.", true);
                        setTabAktif('masuk');
                        currentTab = 'masuk';
                        mulaiBtn.innerText = "Mulai";
                        loginConfirmPassword.classList.add('hidden');
                    } catch (err) {
                        tampilkanPesan(err.message);
                    }
                } else {
                    tampilkanPesan("Pendaftaran lokal berhasil! Silakan masuk.", true);
                    tabMasuk.click();
                }
                return;
            }

            // Login
            if (isSupabaseActive) {
                try {
                    const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
                    if (error) throw error;
                    // Simpan sesi sederhana & redirect ke home
                    sessionStorage.setItem('blogUser', data.user.email);
                    sessionStorage.setItem('blogUid',  data.user.id);
                    window.location.href = 'home.html';
                } catch (err) {
                    tampilkanPesan(err.message);
                }
            } else {
                // Mode offline: simpan user ke sessionStorage lalu redirect
                sessionStorage.setItem('blogUser', email);
                window.location.href = 'home.html';
            }
        });
    </script>
</body>
</html>
